<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Geobattery · interactive 3-D lab</title>
<script src="https://unpkg.com/vtk.js@36.4.1/vtk.js"></script>
<style>
  :root{ --bg:#0b0e11; --panel:#12171dee; --ink:#e8ecef; --mut:#8a929a; --grn:#20c368; --line:#2a323a; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; overflow:hidden; }
  #view{ position:absolute; inset:0; }
  #panelBtn{ position:absolute; top:12px; left:12px; z-index:8; width:42px; height:42px; border-radius:11px;
    background:var(--panel); border:1px solid var(--line); color:var(--ink); font-size:19px; cursor:pointer;
    backdrop-filter:blur(6px); }
  #panelBtn:hover{ border-color:var(--grn); }
  #panel{ position:absolute; top:62px; left:12px; width:276px; max-height:calc(100% - 76px); overflow:auto;
    background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 14px;
    backdrop-filter:blur(6px); font-size:13px; z-index:7;
    transition:transform .22s ease, opacity .22s ease; }
  #panel.closed{ transform:translateX(-115%); opacity:0; pointer-events:none; }
  #panel h1{ font-size:15px; margin:0 0 2px; }
  #panel .sub{ color:var(--mut); font-size:11px; margin-bottom:8px; }
  .grp{ border-top:1px solid var(--line); padding:9px 0 3px; }
  .grp h2{ font:600 11px/1 ui-monospace,Consolas,monospace; letter-spacing:.11em; text-transform:uppercase;
    color:var(--grn); margin:0 0 8px; cursor:pointer; user-select:none; }
  .grp h2::before{ content:'▾ '; color:var(--mut); }
  .grp.fold h2::before{ content:'▸ '; }
  .grp.fold h2{ margin-bottom:2px; }
  .grp.fold > *:not(h2){ display:none; }
  .row{ display:flex; align-items:center; gap:8px; margin:6px 0; }
  .row label{ flex:1; }
  .row input[type=range]{ flex:1; accent-color:var(--grn); }
  input[type=checkbox]{ accent-color:var(--grn); }
  select,button{ background:#1b222a; color:var(--ink); border:1px solid var(--line); border-radius:7px;
    padding:5px 8px; font:inherit; font-size:12px; }
  button{ cursor:pointer; } button:hover{ border-color:var(--grn); }
  .cbar{ position:absolute; right:14px; bottom:16px; width:236px; text-align:center; z-index:5;
    font:600 11px ui-monospace,Consolas,monospace; color:var(--ink);
    background:#12171dd9; border:1px solid var(--line); border-radius:10px; padding:8px 10px;
    backdrop-filter:blur(6px); }
  .cbar .grad{ height:11px; border-radius:6px; border:1px solid #ffffff22; margin-bottom:4px;
    background:linear-gradient(90deg,#5b126e,#a52c60,#ed6925,#f7d13d,#fcffa4); }
  .cbar .lab{ display:flex; justify-content:space-between; color:var(--mut); }
  #status{ position:absolute; bottom:12px; left:12px; z-index:6; font:600 12px ui-monospace,Consolas,monospace;
    color:var(--grn); background:#000a; padding:6px 10px; border-radius:8px; max-width:60%; }
  #status.err{ color:#ff6b6b; white-space:pre-wrap; }
  a.home{ color:var(--grn); text-decoration:none; font-size:12px; }
  @media (max-width:760px){
    #panel{ width:min(276px, calc(100vw - 24px)); }
    .cbar{ width:170px; right:10px; }
  }
</style>
</head>
<body>
<div id="view"></div>
<button id="panelBtn" title="options">☰</button>
<div id="panel">
  <h1>Geobattery · 3-D lab</h1>
  <div class="sub"><span id="sceneLabel">As-built drift · end of charge</span> · T 10–80&nbsp;°C. <a class="home" href="simple/">← simple viewer</a></div>

  <div class="grp"><h2>Scenario</h2>
    <div class="row"><select id="scene" style="flex:1">
      <option value="drift">As-built drift · end of charge</option>
      <option value="array">10 m array cell · year 10</option>
    </select></div>
  </div>

  <div class="grp"><h2>Colour surfaces by</h2>
    <div class="row"><label>mode</label>
      <select id="colMode"><option value="material">material</option><option value="temperature" selected>temperature</option><option value="vm">stress (von Mises)</option><option value="flow">water velocity</option></select>
    </div>
    <div id="tempCtl">
      <div class="row"><input type="checkbox" id="volOn" checked><label for="volOn">volumetric temperature</label></div>
      <div class="row"><label>intensity</label><input type="range" id="volInt" min="0.2" max="3.5" step="0.05" value="1"></div>
    </div>
    <div id="flowCtl" style="display:none">
      <div class="row"><input type="checkbox" id="flowOn" checked><label for="flowOn">static arrow field</label></div>
      <div class="row"><input type="checkbox" id="flowMove"><label for="flowMove">moving arrows</label></div>
      <div class="row"><span style="color:var(--mut);font-size:11px">green = inlet &middot; red = outlet</span></div>
    </div>
  </div>

  <div class="grp" id="timeGrp"><h2>Transient (time)</h2>
    <div class="row"><button id="timePlay" style="min-width:70px">▶ play</button>
      <span id="timeLabel" style="flex:1;text-align:right;color:var(--mut)">—</span></div>
    <div class="row"><input type="range" id="timeSlider" min="0" max="0" step="1" value="0"></div>
  </div>

  <div class="grp" id="layers"><h2>Surfaces</h2></div>

  <div class="grp fold" id="cutGrp"><h2>Clip &amp; slice</h2>
    <div class="row"><input type="checkbox" id="clipOn"><label for="clipOn">clip surfaces</label></div>
    <div class="row"><input type="checkbox" id="sliceOn"><label for="sliceOn">temperature plane (cap)</label></div>
    <div class="row"><label>axis</label>
      <select id="cutAxis"><option value="0">X</option><option value="1">Y</option><option value="2" selected>Z</option></select>
    </div>
    <div class="row"><label>flip side</label><input type="checkbox" id="clipFlip"></div>
    <div class="row"><input type="range" id="cutPos" min="0" max="1" step="0.005" value="0.5"></div>
    <div class="row"><span style="color:var(--mut);font-size:11px">plane shows T across the whole domain</span></div>
  </div>

  <div class="grp fold"><h2>Representation</h2>
    <div class="row"><label>style</label>
      <select id="repr"><option value="2">surface</option><option value="1">wireframe</option><option value="0">points</option></select>
    </div>
    <div class="row"><label>edges</label><input type="checkbox" id="edges"></div>
  </div>

  <div class="grp"><button id="reset">Reset view</button></div>
</div>

<div class="cbar"><div class="grad" id="cbGrad"></div><div class="lab"><span id="cbLo">10&nbsp;°C</span><span id="cbMid">temperature</span><span id="cbHi">80&nbsp;°C</span></div></div>
<div id="status">loading vtk.js…</div>

<script>
const S = document.getElementById('status');
const setStatus = (m, err=false) => { S.textContent = m; S.className = err ? 'err' : ''; };
window.addEventListener('error', e => setStatus('Error: ' + (e.message || e.error), true));

// ---- panel popup + collapsible groups ----
const panel = document.getElementById('panel');
document.getElementById('panelBtn').onclick = () => panel.classList.toggle('closed');
if (window.innerWidth < 760) panel.classList.add('closed');
document.querySelectorAll('#panel .grp h2').forEach(h => {
  h.onclick = () => h.parentElement.classList.toggle('fold');
});

// ---- colour ramps ----
const INFERNO = [[0,0,0.016],[0.086,0.043,0.224],[0.259,0.039,0.408],[0.416,0.090,0.431],
  [0.576,0.149,0.404],[0.737,0.216,0.330],[0.867,0.318,0.227],[0.953,0.471,0.098],
  [0.988,0.647,0.039],[0.965,0.835,0.263],[0.988,1.0,0.643]];
const TCLIM = [-15, 80];       // colour-mapping range: 10 C ambient lands on magenta, not black
const SPEED_COLORS = [[0.23,0.30,0.75],[0.15,0.65,0.90],[0.20,0.80,0.35],[0.95,0.85,0.15],[0.90,0.25,0.15]];
const STRESS_COLORS = [[0.267,0.005,0.329],[0.229,0.322,0.545],[0.128,0.567,0.551],
                       [0.369,0.789,0.383],[0.993,0.906,0.144]];             // viridis
const cssGrad = cols => 'linear-gradient(90deg,' + cols.map(c =>
  `rgb(${Math.round(c[0]*255)},${Math.round(c[1]*255)},${Math.round(c[2]*255)})`).join(',') + ')';
function rampSlice(cols, f0, f1, n) {                    // sample a sub-range of a ramp
  const pick = f => {
    const x = Math.max(0, Math.min(1, f)) * (cols.length - 1);
    const i = Math.min(cols.length - 2, Math.floor(x)), u = x - i;
    return [0,1,2].map(k => cols[i][k]*(1-u) + cols[i+1][k]*u);
  };
  return Array.from({length: n}, (_, j) => pick(f0 + (f1 - f0) * j / (n - 1)));
}
function tempCTF() {
  const lut = vtk.Rendering.Core.vtkColorTransferFunction.newInstance();
  lut.addRGBPoint(-100, INFERNO[0][0], INFERNO[0][1], INFERNO[0][2]);
  INFERNO.forEach((c,i) => lut.addRGBPoint(TCLIM[0] + (i/(INFERNO.length-1))*(TCLIM[1]-TCLIM[0]), c[0], c[1], c[2]));
  return lut;
}

function main() {
  if (!window.vtk) { setStatus('vtk.js failed to load.', true); return; }
  const SCENES = { drift:'As-built drift · end of charge', array:'10 m array cell · year 10 storage' };
  const q = new URLSearchParams(location.search).get('scene');
  const SCENE = (q && SCENES[q]) ? q : 'drift';
  const DATA = 'data/' + SCENE + '/';
  document.getElementById('sceneLabel').textContent = SCENES[SCENE];
  const sceneSel = document.getElementById('scene'); sceneSel.value = SCENE;
  sceneSel.onchange = e => { location.search = '?scene=' + e.target.value; };
  const view = vtk.Rendering.Misc.vtkFullScreenRenderWindow.newInstance({
    rootContainer: document.getElementById('view'), background: [0.82, 0.85, 0.88] });   // light bg
  const renderer = view.getRenderer();
  const renderWindow = view.getRenderWindow();
  const clipPlane = vtk.Common.DataModel.vtkPlane.newInstance();
  const surfLUT = tempCTF();

  // ---- surface layers (Phong + specular per material) ----
  const LAYERS = [
    { name:'water',    file:'water_transient.vtp', opacity:0.8, visible:false, solid:[0.24,0.52,0.85], spec:0.85, specPow:60 },
    { name:'rock',     file:'rock.vtp',     opacity:0.22, visible:true, solid:[0.44,0.47,0.54], spec:0.32, specPow:14 },
    { name:'concrete', file:'concrete.vtp', opacity:0.95, visible:true, solid:[0.38,0.41,0.46], spec:0.12, specPow:8 },
    { name:'air',      file:'air.vtp',      opacity:0.32, visible:true, solid:[0.42,0.62,0.82], spec:0.35, specPow:25 },
  ];
  const objs = {};

  function buildRow(L) {
    const wrap = document.getElementById('layers');
    const r = document.createElement('div'); r.className = 'row';
    r.innerHTML = `<input type="checkbox" ${L.visible?'checked':''} id="vis_${L.name}">
      <label for="vis_${L.name}" style="text-transform:capitalize">${L.name}</label>
      <input type="range" min="0" max="1" step="0.02" value="${L.opacity}" id="op_${L.name}">`;
    wrap.appendChild(r);
    r.querySelector(`#vis_${L.name}`).onchange = e => { objs[L.name].actor.setVisibility(e.target.checked); renderWindow.render(); };
    r.querySelector(`#op_${L.name}`).oninput  = e => { objs[L.name].actor.getProperty().setOpacity(+e.target.value); renderWindow.render(); };
  }
  function loadLayer(L) {
    const rd = vtk.IO.XML.vtkXMLPolyDataReader.newInstance();
    return rd.setUrl(DATA + L.file).then(() => {
      const mapper = vtk.Rendering.Core.vtkMapper.newInstance();
      mapper.setInputData(rd.getOutputData(0));
      const actor = vtk.Rendering.Core.vtkActor.newInstance();
      actor.setMapper(mapper);
      const pr = actor.getProperty();
      pr.setInterpolationToPhong();                    // shaded, slightly metallic look
      pr.setAmbient(0.12); pr.setDiffuse(0.88);
      if (L.spec != null) { pr.setSpecular(L.spec); pr.setSpecularPower(L.specPow || 20); pr.setSpecularColor(1, 1, 1); }
      if (L.solid) {                                   // solid geometry colour (reads on dark bg)
        mapper.setScalarVisibility(false);
        pr.setColor(L.solid[0], L.solid[1], L.solid[2]);
      }
      pr.setOpacity(L.opacity); actor.setVisibility(L.visible);
      renderer.addActor(actor);
      objs[L.name] = { mapper, actor };
      objs[L.name].hasVM = !!rd.getOutputData(0).getPointData().getArrayByName('vm');
      buildRow(L);
    }).catch(() => { /* region absent in this scenario — skip */ });
  }

  // ---- volumetric temperature (ImageData) — transient time series ----
  let volume = null, otf = null, volImage = null, volMapper = null;
  let imgSlice = null, imgMapper = null;                 // interior slice (hoisted for frame swap)
  let frames = [], frameIdx = 0, playing = false, playTimer = null;
  let colMode = 'material';                              // tracks the "colour surfaces by" toggle
  const fn = i => 'T' + String(i).padStart(2, '0');      // water-surface per-frame array name
  const frameCache = {};
  function buildOTF(scale) {
    // opacity follows warmth only: the plume + its halo glow, ambient stays clear
    const f = vtk.Common.DataModel.vtkPiecewiseFunction.newInstance();
    f.addPoint(-100, 0.0); f.addPoint(9.5, 0.0);
    f.addPoint(14, 0.012*scale); f.addPoint(22, 0.035*scale);
    f.addPoint(34, 0.07*scale);  f.addPoint(48, 0.14*scale);
    f.addPoint(64, 0.30*scale);  f.addPoint(80, 0.55*scale);
    return f;
  }
  function loadFrameImage(i) {
    if (frameCache[i]) return Promise.resolve(frameCache[i]);
    const rd = vtk.IO.XML.vtkXMLImageDataReader.newInstance();
    return rd.setUrl(DATA + frames[i].file).then(() => {
      const img = rd.getOutputData(0); frameCache[i] = img; return img; });
  }
  function showFrame(i) {
    if (!frames.length) return Promise.resolve();
    frameIdx = (i + frames.length) % frames.length;
    return loadFrameImage(frameIdx).then(img => {
      volImage = img;
      if (volMapper) volMapper.setInputData(img);
      if (imgMapper) imgMapper.setInputData(img);
      if (objs.water && colMode === 'temperature') {     // animate the water surface too
        objs.water.mapper.setColorByArrayName(fn(frameIdx));
        objs.water.mapper.setScalarVisibility(true);
      }
      const lab = document.getElementById('timeLabel'); if (lab) lab.textContent = frames[frameIdx].label;
      const sl  = document.getElementById('timeSlider'); if (sl) sl.value = frameIdx;
      renderWindow.render();
    });
  }
  function loadVolume() {
    return fetch(DATA + 'frames.json').then(r => r.json()).then(list => {
      frames = list; frameIdx = 0;
      return loadFrameImage(0);
    }).then(img => {
      volImage = img;
      volMapper = vtk.Rendering.Core.vtkVolumeMapper.newInstance();
      volMapper.setInputData(img);
      volMapper.setSampleDistance(0.4);
      volume = vtk.Rendering.Core.vtkVolume.newInstance();
      volume.setMapper(volMapper);
      otf = buildOTF(1.0);
      const p = volume.getProperty();
      p.setRGBTransferFunction(0, tempCTF());
      p.setScalarOpacity(0, otf);
      p.setInterpolationTypeToLinear();
      p.setScalarOpacityUnitDistance(0, 1.2);
      p.setShade(false);
      renderer.addVolume(volume);
    }).catch(e => { console.warn('volume/frames unavailable', e); });
  }

  setStatus('loading meshes + volume…');
  Promise.all([...LAYERS.map(loadLayer), loadVolume()]).then(() => {
    renderer.resetCamera(); renderWindow.render();
    setStatus('ready · drag to rotate, scroll to zoom');
    const b = renderer.computeVisiblePropBounds();

    // ---- stress (von Mises) colour data ----
    let stressMeta = null, stressLUT = null;
    fetch(DATA + 'stress.json').then(r => r.ok ? r.json() : Promise.reject('no stress')).then(m => {
      stressMeta = m;
      stressLUT = vtk.Rendering.Core.vtkColorTransferFunction.newInstance();
      STRESS_COLORS.forEach((c, i) => stressLUT.addRGBPoint(
        m.vmin + (i/(STRESS_COLORS.length-1))*(m.vmax - m.vmin), c[0], c[1], c[2]));
      if (colMode === 'vm') setColorMode('vm');
      updateColorbar();
    }).catch(() => {
      const o = document.querySelector('#colMode option[value="vm"]'); if (o) o.remove();
    });

    document.getElementById('volOn').onchange = () => {
      if (volume) volume.setVisibility(colMode === 'temperature' && document.getElementById('volOn').checked);
      renderWindow.render();
    };
    document.getElementById('volInt').oninput = e => {
      if (!volume) return;
      otf = buildOTF(+e.target.value);
      volume.getProperty().setScalarOpacity(0, otf); renderWindow.render();
    };

    document.getElementById('repr').onchange = e => {
      const v=+e.target.value; Object.values(objs).forEach(o=>o.actor.getProperty().setRepresentation(v)); renderWindow.render(); };
    document.getElementById('edges').onchange = e => {
      Object.values(objs).forEach(o=>o.actor.getProperty().setEdgeVisibility(e.target.checked)); renderWindow.render(); };

    // ---- interior slice: axis-aligned plane of the volume, transparent outside the domain ----
    try {
      if (volImage) {
        const dims0 = volImage.getDimensions();
        imgMapper = vtk.Rendering.Core.vtkImageMapper.newInstance();
        imgMapper.setInputData(volImage);
        imgMapper.setSlicingMode(2);
        imgMapper.setSlice(Math.floor(dims0[2] / 2));
        imgSlice = vtk.Rendering.Core.vtkImageSlice.newInstance();
        imgSlice.setMapper(imgMapper);
        const ip = imgSlice.getProperty();
        ip.setRGBTransferFunction(0, tempCTF());
        const spwf = vtk.Common.DataModel.vtkPiecewiseFunction.newInstance();
        spwf.addPoint(-100, 0.0); spwf.addPoint(5, 0.0); spwf.addPoint(9.9, 0.0);
        spwf.addPoint(10, 1.0); spwf.addPoint(80, 1.0);
        ip.setPiecewiseFunction(0, spwf);              // sentinel (outside mesh) -> transparent
        if (ip.setUseLookupTableScalarRange) ip.setUseLookupTableScalarRange(true);
        ip.setColorWindow(180); ip.setColorLevel(-10); // fallback mapping over [-100, 80]
        imgSlice.setVisibility(false);
        renderer.addViewProp(imgSlice);
      }
    } catch (e) { imgSlice = null; console.warn('slice setup failed', e); }

    // ---- clip & slice: ONE plane — clips the checked surfaces and (optionally)
    //      caps the cut with the full-domain temperature cross-section ----
    function applyCut() {
      const clipOn = document.getElementById('clipOn').checked;
      const sliceOn = document.getElementById('sliceOn').checked;
      const ax = +document.getElementById('cutAxis').value;
      const t = +document.getElementById('cutPos').value;
      const flip = document.getElementById('clipFlip').checked ? -1 : 1;
      const w = b[ax*2] + t * (b[ax*2+1] - b[ax*2]);     // world position along axis
      Object.values(objs).forEach(o => o.mapper.removeAllClippingPlanes());
      if (clipOn) {
        const n = [0,0,0]; n[ax] = flip;
        const o = [(b[0]+b[1])/2, (b[2]+b[3])/2, (b[4]+b[5])/2]; o[ax] = w;
        clipPlane.setNormal(n[0], n[1], n[2]); clipPlane.setOrigin(o[0], o[1], o[2]);
        Object.values(objs).forEach(o2 => o2.mapper.addClippingPlane(clipPlane));
      }
      if (imgSlice) {
        imgSlice.setVisibility(sliceOn);
        if (sliceOn && volImage) {
          imgMapper.setSlicingMode(ax);
          const org = volImage.getOrigin(), sp = volImage.getSpacing(), dm = volImage.getDimensions();
          const idx = Math.max(0, Math.min(dm[ax]-1, Math.round((w - org[ax]) / sp[ax])));
          imgMapper.setSlice(idx);
        }
      }
      renderWindow.render();
    }
    ['clipOn','sliceOn','cutAxis','clipFlip','cutPos'].forEach(id => {
      document.getElementById(id).addEventListener('input', applyCut);
      document.getElementById(id).addEventListener('change', applyCut); });

    // ---- colour surfaces: material / temperature / von Mises / water velocity ----
    function setFieldVis() {
      document.getElementById('tempCtl').style.display = colMode === 'temperature' ? '' : 'none';
      document.getElementById('flowCtl').style.display = colMode === 'flow' ? '' : 'none';
      if (volume) volume.setVisibility(colMode === 'temperature' && document.getElementById('volOn').checked);
      syncFlowVis();
    }
    function setColorMode(mode) {
      colMode = mode;
      LAYERS.forEach(L => {
        const o = objs[L.name]; if (!o) return;
        if (mode === 'temperature') {
          o.mapper.setLookupTable(surfLUT); o.mapper.setScalarModeToUsePointFieldData();
          o.mapper.setColorByArrayName(L.name === 'water' ? fn(frameIdx) : 'T');
          o.mapper.setScalarRange(TCLIM[0], TCLIM[1]);
          o.mapper.setScalarVisibility(true); o.mapper.setInterpolateScalarsBeforeMapping(true);
          o.actor.getProperty().setLighting(false);      // flat: colours match the colourbar
        } else if (mode === 'vm' && o.hasVM && stressLUT) {
          o.mapper.setLookupTable(stressLUT); o.mapper.setScalarModeToUsePointFieldData();
          o.mapper.setColorByArrayName('vm');
          o.mapper.setScalarRange(stressMeta.vmin, stressMeta.vmax);
          o.mapper.setScalarVisibility(true); o.mapper.setInterpolateScalarsBeforeMapping(true);
          o.actor.getProperty().setLighting(false);      // flat: colours match the colourbar
        } else if (L.solid) {                            // material (and flow / non-vm layers)
          o.mapper.setScalarVisibility(false);
          o.actor.getProperty().setColor(L.solid[0], L.solid[1], L.solid[2]);
          o.actor.getProperty().setLighting(true);       // shaded material look
        }
      });
      setFieldVis();
      updateColorbar();
      renderWindow.render();
    }
    document.getElementById('colMode').onchange = e => setColorMode(e.target.value);

    // ---- transient: play / scrub the temperature time series ----
    const timeGrp = document.getElementById('timeGrp');
    if (frames.length > 1) {
      const slider = document.getElementById('timeSlider');
      const playBtn = document.getElementById('timePlay');
      document.getElementById('timeLabel').textContent = frames[0].label;
      slider.max = frames.length - 1; slider.value = 0;
      frames.forEach((_, i) => { if (i) loadFrameImage(i); });   // background-preload for smooth playback
      const stopPlay = () => { playing = false; if (playTimer) clearTimeout(playTimer); playTimer = null; playBtn.textContent = '▶ play'; };
      const step = () => { showFrame(frameIdx + 1).then(() => { if (playing) playTimer = setTimeout(step, 950); }); };
      playBtn.onclick = () => { if (playing) stopPlay(); else { playing = true; playBtn.textContent = '⏸ pause'; step(); } };
      slider.oninput = e => { stopPlay(); showFrame(+e.target.value); };
    } else if (timeGrp) {
      timeGrp.style.display = 'none';
    }

    // ---- flow field (drift only): arrows + moving arrows, lazy-loaded ----
    let flowActor = null, flowLoading = false, flowMeta = null, speedLUT = null;
    let pActor = null, pLoading = false, pOn = false, pRAF = null, pLastT = null, pAccum = 0;
    let pLines = null, pList = null, pCoords = null, pSpd = null, pDir = null, pScl = null, pPts = null, pScal = null, pDirArr = null, pSclArr = null, pPoly = null;
    const PPL = 3, P_SPEED = 7.0, P_SIZE = 7;

    function syncFlowVis() {                 // flow actors follow the "water velocity" mode
      const on = colMode === 'flow' && !!flowMeta;
      const so = on && document.getElementById('flowOn').checked;
      const mo = on && document.getElementById('flowMove').checked;
      if (so && !flowActor && !flowLoading) { flowLoading = true; setStatus('loading flow field…'); loadFlow(); }
      if (flowActor) flowActor.setVisibility(so);
      pOn = mo;
      if (mo) {
        if (!pActor && !pLoading) { pLoading = true; setStatus('loading moving arrows…'); loadParticles(); }
        else if (pActor) { pActor.setVisibility(true); startParticleAnim(); }
      } else {
        if (pRAF) cancelAnimationFrame(pRAF); pRAF = null;
        if (pActor) pActor.setVisibility(false);
      }
    }

    // ---- dynamic colourbar: stress > velocity > temperature ----
    function updateColorbar() {
      const g = document.getElementById('cbGrad'), lo = document.getElementById('cbLo'),
            mid = document.getElementById('cbMid'), hi = document.getElementById('cbHi');
      if (colMode === 'vm' && stressMeta) {
        g.style.background = cssGrad(STRESS_COLORS);
        lo.textContent = stressMeta.vmin.toFixed(1); mid.textContent = 'von Mises [MPa]'; hi.textContent = stressMeta.vmax.toFixed(1);
      } else if (colMode === 'flow' && flowMeta) {
        g.style.background = cssGrad(SPEED_COLORS);
        lo.textContent = '0'; mid.textContent = '|u| [m/s]'; hi.textContent = flowMeta.clip.toExponential(1);
      } else {
        g.style.background = cssGrad(rampSlice(INFERNO, (10 - TCLIM[0]) / (TCLIM[1] - TCLIM[0]), 1, 8));
        lo.textContent = '10 °C'; mid.textContent = 'temperature'; hi.textContent = '80 °C';
      }
    }

    function loadFlow() {
      const rd = vtk.IO.XML.vtkXMLPolyDataReader.newInstance();
      rd.setUrl(DATA + 'flow_arrows.vtp').then(() => {
        const m = vtk.Rendering.Core.vtkMapper.newInstance();
        m.setInputData(rd.getOutputData(0));
        m.setLookupTable(speedLUT); m.setScalarModeToUsePointFieldData();
        m.setColorByArrayName('speed'); m.setScalarRange(0, flowMeta.clip);
        m.setScalarVisibility(true); m.setInterpolateScalarsBeforeMapping(true);
        flowActor = vtk.Rendering.Core.vtkActor.newInstance();
        flowActor.setMapper(m); flowActor.getProperty().setLighting(false);
        renderer.addActor(flowActor);
        flowActor.setVisibility(colMode === 'flow' && document.getElementById('flowOn').checked);
        flowLoading = false; renderWindow.render();
        setStatus('ready · drag to rotate, scroll to zoom');
      }).catch(err => { flowLoading = false; setStatus('flow load failed: ' + err, true); });
    }

    function addWell(center, color) {                 // inlet/outlet marker sphere
      const s = vtk.Filters.Sources.vtkSphereSource.newInstance(
        { center: center, radius: 0.35, thetaResolution: 22, phiResolution: 22 });
      const m = vtk.Rendering.Core.vtkMapper.newInstance(); m.setInputConnection(s.getOutputPort());
      const a = vtk.Rendering.Core.vtkActor.newInstance(); a.setMapper(m);
      a.getProperty().setColor(color[0], color[1], color[2]);
      a.getProperty().setAmbient(0.35); a.getProperty().setDiffuse(0.75);
      renderer.addActor(a);
    }
    function startParticleAnim() {
      if (pRAF) cancelAnimationFrame(pRAF);
      pLastT = null; pRAF = requestAnimationFrame(stepParticles);
    }
    function stepParticles(ts) {
      if (!pOn || !pPoly) return;
      if (pLastT === null) pLastT = ts;
      pAccum += (ts - pLastT) / 1000 * P_SPEED; pLastT = ts;
      const base = Math.floor(pAccum);
      for (let i = 0; i < pList.length; i++) {
        const it = pList[i], L = pLines[it.l], len = L.pts.length;
        let idx = (base + it.p) % len; if (idx < 0) idx += len;
        const q = L.pts[idx], d = L.dir[idx];
        pCoords[3*i] = q[0]; pCoords[3*i+1] = q[1]; pCoords[3*i+2] = q[2];
        pDir[3*i] = d[0]; pDir[3*i+1] = d[1]; pDir[3*i+2] = d[2];
        pScl[i] = L.scl[idx]; pSpd[i] = L.spd[idx];
      }
      pPts.setData(pCoords, 3); pScal.setData(pSpd, 1);
      if (pDirArr) pDirArr.setData(pDir, 3);
      if (pSclArr) pSclArr.setData(pScl, 1);
      pPoly.modified();
      renderWindow.render();
      pRAF = requestAnimationFrame(stepParticles);
    }
    function loadParticles() {
      fetch(DATA + 'flowlines.json').then(r => r.json()).then(fl => {
        pLines = fl.lines; pList = [];
        pLines.forEach((L, li) => {
          const P = L.pts, n = P.length; L.dir = new Array(n); L.scl = new Array(n);
          for (let j = 0; j < n; j++) {
            const a = P[Math.min(j, n - 2)], b2 = P[Math.min(j + 1, n - 1)];
            const dx = b2[0]-a[0], dy = b2[1]-a[1], dz = b2[2]-a[2];
            const mm = Math.hypot(dx, dy, dz) || 1; L.dir[j] = [dx/mm, dy/mm, dz/mm];
            const al = Math.min(0.78, Math.max(0.20, 0.78 * Math.sqrt((L.spd[j] || 0) / flowMeta.clip)));
            L.scl[j] = al * 0.6;                                   // speed-scaled, ~0.6x the static arrows
          }
          const per = Math.min(PPL, n), phi = Math.random();     // random per-line phase
          for (let k = 0; k < per; k++) pList.push({ l: li, p: Math.floor((k / per + phi) * n) % n });
        });
        const N = pList.length;
        pCoords = new Float32Array(N * 3); pDir = new Float32Array(N * 3);
        pSpd = new Float32Array(N); pScl = new Float32Array(N);
        pPts = vtk.Common.Core.vtkPoints.newInstance(); pPts.setData(pCoords, 3);
        pPoly = vtk.Common.DataModel.vtkPolyData.newInstance(); pPoly.setPoints(pPts);
        const verts = new Uint32Array(N * 2);
        for (let i = 0; i < N; i++) { verts[2*i] = 1; verts[2*i+1] = i; }
        pPoly.getVerts().setData(verts);
        pDirArr = vtk.Common.Core.vtkDataArray.newInstance({ name: 'dir', values: pDir, numberOfComponents: 3 });
        pSclArr = vtk.Common.Core.vtkDataArray.newInstance({ name: 'scl', values: pScl, numberOfComponents: 1 });
        pScal = vtk.Common.Core.vtkDataArray.newInstance({ name: 'spd', values: pSpd, numberOfComponents: 1 });
        pPoly.getPointData().addArray(pDirArr);
        pPoly.getPointData().addArray(pSclArr);
        pPoly.getPointData().setScalars(pScal);
        let mapper = null;
        try {                                     // moving ARROWS via glyph mapper
          const arrowSrc = vtk.Filters.Sources.vtkArrowSource.newInstance(
            { tipResolution: 8, shaftResolution: 8, tipRadius: 0.32, tipLength: 0.42, shaftRadius: 0.10 });
          const gm = vtk.Rendering.Core.vtkGlyph3DMapper.newInstance();
          gm.setInputData(pPoly, 0);
          gm.setInputConnection(arrowSrc.getOutputPort(), 1);
          gm.setOrient(true); gm.setOrientationArray('dir');
          gm.setScaleArray('scl'); gm.setScaleFactor(1.0);
          gm.setScalarVisibility(false);          // solid water colour, not speed
          mapper = gm;
        } catch (e) {                             // fallback: moving points
          console.warn('glyph mapper unavailable, moving points instead', e);
          const m = vtk.Rendering.Core.vtkMapper.newInstance();
          m.setInputData(pPoly); m.setScalarVisibility(false);
          mapper = m;
        }
        pActor = vtk.Rendering.Core.vtkActor.newInstance(); pActor.setMapper(mapper);
        pActor.getProperty().setColor(0.32, 0.62, 0.95);   // water blue
        pActor.getProperty().setPointSize(P_SIZE);
        renderer.addActor(pActor);
        pActor.setVisibility(pOn);
        pLoading = false; if (pOn) startParticleAnim();
        setStatus('ready · drag to rotate, scroll to zoom');
      }).catch(err => { pLoading = false; setStatus('particles load failed: ' + err, true); });
    }

    fetch(DATA + 'flow.json').then(r => r.ok ? r.json() : Promise.reject('no flow')).then(meta => {
      flowMeta = meta;
      speedLUT = vtk.Rendering.Core.vtkColorTransferFunction.newInstance();
      SPEED_COLORS.forEach((c,i) => speedLUT.addRGBPoint(i/(SPEED_COLORS.length-1)*meta.clip, c[0],c[1],c[2]));
      if (meta.inlet && meta.outlet) {                 // nudge markers off the wall, into the water
        const M = meta.inlet.map((v, i) => (v + meta.outlet[i]) / 2);
        const inward = (p, off) => { const d = M.map((m, i) => m - p[i]); const nn = Math.hypot(d[0], d[1], d[2]) || 1; return p.map((v, i) => v + off * d[i] / nn); };
        addWell(inward(meta.inlet, 0.55),  [0.20, 0.90, 0.42]);   // green = inlet
        addWell(inward(meta.outlet, 0.55), [0.96, 0.35, 0.15]);   // red = outlet
      }
      renderWindow.render();
      document.getElementById('flowOn').onchange = () => { syncFlowVis(); renderWindow.render(); };
      document.getElementById('flowMove').onchange = () => { syncFlowVis(); renderWindow.render(); };
      syncFlowVis(); updateColorbar();
    }).catch(() => {
      const o = document.querySelector('#colMode option[value="flow"]'); if (o) o.remove();
      if (colMode === 'flow') { document.getElementById('colMode').value = 'material'; setColorMode('material'); }
    });

    setColorMode(document.getElementById('colMode').value);
    document.getElementById('reset').onclick = () => { renderer.resetCamera(); renderWindow.render(); };
  }).catch(err => setStatus('Load failed: ' + err, true));
}
main();
</script>
</body>
</html>
